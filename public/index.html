<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>북마크 관리</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>북마크 관리</h1>
    </header>

    <section class="form-section">
      <h2 id="form-title">북마크 추가</h2>
      <form id="bookmark-form">
        <input type="hidden" id="edit-id" />
        <div class="form-row">
          <div class="form-group">
            <label for="url">URL</label>
            <input type="text" id="url" placeholder="https://example.com" required />
            <span id="url-error" class="input-error-msg hidden"></span>
            <div id="url-duplicate" class="url-duplicate hidden"></div>
          </div>
          <div class="form-group">
            <label for="title">제목</label>
            <input type="text" id="title" placeholder="사이트 제목" required />
          </div>
          <div class="form-group autocomplete-wrap">
            <label for="category">카테고리</label>
            <input type="text" id="category" placeholder="예: 개발, 뉴스, 블로그" autocomplete="off" />
            <ul id="category-dropdown" class="autocomplete-dropdown hidden"></ul>
          </div>
          <div class="form-group btn-group">
            <button type="submit" id="submit-btn">추가</button>
            <button type="button" id="cancel-btn" class="hidden">취소</button>
          </div>
        </div>
      </form>
    </section>

    <section class="list-section">
      <div class="toolbar">
        <div class="search-box">
          <input type="text" id="search" placeholder="제목 또는 URL 검색..." />
        </div>
        <div class="category-filter" id="category-filter">
          <button class="filter-btn active" data-category="전체">전체</button>
        </div>
      </div>
      <div id="bookmark-count" class="count-label"></div>
      <ul id="bookmark-list"></ul>
      <div id="empty-state" class="empty-state hidden">
        <p>등록된 북마크가 없습니다.</p>
      </div>
    </section>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
